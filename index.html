<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirubel Daniel | Full-Stack Web Developer Portfolio</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb',       /* Custom Blue color */
                        'brand-hover': '#1d4ed8',
                        divider: '#e2e8f0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Container for the Contact Form Card -->
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        
        <!-- Header Section -->
        <div class="bg-slate-900 p-6 text-white text-center">
            <h2 class="text-xl font-bold tracking-tight">Let's Work Together</h2>
            <p class="text-xs text-slate-400 mt-1">Submit your project proposal or a general inquiry</p>
        </div>

        <!-- The Contact Form -->
        <form id="project-form" onsubmit="submitProjectProposal(event)" class="p-6 pt-4 space-y-4">
            
            <!-- Input: Name -->
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1">Full Name</label>
                <input 
                    type="text" 
                    id="project-name" 
                    required 
                    pattern="^[A-Za-z\s]+$"
                    title="Please enter a valid name using only letters and spaces (no numbers or special characters)."
                    placeholder="E.g., Michael Scott" 
                    class="w-full bg-white border border-divider rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand [&:not(:placeholder-shown):not(:focus):invalid]:border-red-500 [&:not(:placeholder-shown):not(:focus):invalid]:text-red-600 focus:invalid:border-red-500 focus:invalid:ring-red-500"
                >
            </div>
            
            <!-- Input: Email -->
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1">Email Address</label>
                <input 
                    type="email" 
                    id="project-email" 
                    required 
                    placeholder="E.g., manager@company.com" 
                    class="w-full bg-white border border-divider rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand [&:not(:placeholder-shown):not(:focus):invalid]:border-red-500 [&:not(:placeholder-shown):not(:focus):invalid]:text-red-600 focus:invalid:border-red-500 focus:invalid:ring-red-500"
                >
            </div>

            <!-- Input: Message -->
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1">Project Proposal / Message</label>
                <textarea 
                    id="project-message" 
                    required 
                    rows="4" 
                    placeholder="Describe the project goal, stack, and scope..." 
                    class="w-full bg-white border border-divider rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand resize-none"
                ></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-paper-plane"></i> Send Message
            </button>
        </form>

    </div>

    <!-- Frontend Form Submission Logic -->
    <script>
        async function submitProjectProposal(event) {
            // 1. Prevent standard form reload behavior
            event.preventDefault();

            // 2. Locate form elements and their values
            const nameField = document.getElementById('project-name');
            const emailField = document.getElementById('project-email');
            const messageField = document.getElementById('project-message');
            const submitBtn = event.target.querySelector('button[type="submit"]');

            const payload = {
                name: nameField.value,
                email: emailField.value,
                message: messageField.value
            };

            // 3. Update button state to show loading spinner
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> Sending...';

            try {
                // 4. Dispatch the JSON payload to your custom backend (localhost:5000)
                const response = await fetch('http://localhost:5000/api/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('Your message has been sent successfully!');
                    document.getElementById('project-form').reset();
                } else {
                    alert(`Error: ${data.message || 'Something went wrong.'}`);
                }
            } catch (error) {
                console.error('Frontend Fetch Error:', error);
                alert('Could not connect to your server. Double-check that your Node backend is running on port 5000!');
            } finally {
                // 5. Restore the button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        }
    </script>
</body>
</html>
